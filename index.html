<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- 📱 مهم للموبايل -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 SEO Title -->
    <title>Bestar Clinic - Advanced Aesthetic & Hair Restoration Center</title>

    <!-- 🔥 SEO Description -->
    <meta name="description" content="Bestar Clinic is a leading aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and advanced skin treatments with world-class expertise.">

    <!-- 🔑 Keywords -->
    <meta name="keywords" content="hair transplant, botox, fillers, PRP, skin care, aesthetic clinic, best clinic Egypt, زراعة الشعر, بوتوكس, فيلر">

    <!-- 👤 Author -->
    <meta name="author" content="Bestar Clinic" />

    <!-- 🤖 Robots -->
    <meta name="robots" content="index, follow" />

    <!-- 🌍 Canonical -->
    <link rel="canonical" href="https://bestarclinic.vercel.app/" />

    <!-- 🔥 Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bestarclinic.vercel.app/" />
    <meta property="og:image" content="https://bestarclinic.vercel.app/images/hero.png" />
    <meta property="og:title" content="Bestar Clinic - Advanced Aesthetic & Hair Restoration Center" />
    <meta property="og:description" content="Bestar Clinic is a world-class aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and skin treatments." />

    <!-- 🐦 Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bestarclinic.vercel.app/" />
    <meta name="twitter:image" content="https://bestarclinic.vercel.app/images/hero.png" />
    <meta name="twitter:title" content="Bestar Clinic - Advanced Aesthetic & Hair Restoration Center" />
    <meta name="twitter:description" content="Bestar Clinic is a world-class aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and skin treatments." />

    <!-- 🌐 Language -->
    <meta http-equiv="Content-Language" content="en" />

    <!-- 📌 Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- ⚡ Preload Image -->
    <link rel="preload" as="image" href="/images/hero.png">

    <!-- 🔥 Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalClinic",
      "name": "Bestar Clinic",
      "url": "https://bestarclinic.vercel.app/",
      "image": "https://bestarclinic.vercel.app/images/hero.png",
      "description": "Advanced aesthetic and hair restoration clinic offering hair transplant, botox, fillers and PRP.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "EG"
      }
    }
    </script>

    <style>
      .chat-hint {
        position: fixed;
        bottom: 95px;
        right: 20px;
        background: #ffffff;
        color: #222;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        animation: fadeSlide 0.6s ease forwards, float 3s ease-in-out infinite;
        z-index: 9999;
        opacity: 0;
        max-width: 220px;
      }

      .chat-hint span {
        color: #ff6600;
        font-weight: 600;
      }

      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
      }

      .chat-pulse {
        position: fixed;
        bottom: 22px;
        right: 22px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 102, 0, 0.25);
        animation: pulse 2s infinite;
        z-index: 9998;
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        70% { transform: scale(1.6); opacity: 0; }
        100% { opacity: 0; }
      }

      @media (max-width: 600px) {
        .chat-hint {
          bottom: 80px;
          right: 10px;
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- 🔥 Chatbot (DELAYED LOAD) -->
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          const script = document.createElement("script");
          script.src = "https://smart-clinic-aide.lovable.app/widget.js";
          script.async = true;
          document.body.appendChild(script);
        }, 4000);
      });
    </script>

    <div class="chat-hint" id="chatHint">
      👋 محتاج استشارة؟ <br>
      <span>اتكلم مع الشات بوت !</span>
    </div>

    <div class="chat-pulse"></div>

    <script>
      const hint = document.getElementById("chatHint");

      setTimeout(() => {
        hint.style.opacity = "1";
      }, 4000);

      window.addEventListener("message", function(event) {
        if (event.data === "chat_opened") {
          hint.style.display = "none";
        }
      });

      hint.addEventListener("click", () => {
        hint.style.display = "none";
      });
    </script>

  </body>
</html>
