<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestar Clinic - Advanced Aesthetic & Hair Restoration Center</title>

    <meta name="description" content="Bestar Clinic is a world-class aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and skin treatments.">
    <meta name="author" content="Bestar Clinic" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero.png">
    <meta property="og:title" content="Bestar Clinic - Advanced Aesthetic & Hair Restoration Center">
    <meta property="og:description" content="Bestar Clinic is a world-class aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and skin treatments.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/images/hero.png">
    <meta name="twitter:title" content="Bestar Clinic - Advanced Aesthetic & Hair Restoration Center">
    <meta name="twitter:description" content="Bestar Clinic is a world-class aesthetic and hair restoration center offering hair transplant, botox, fillers, PRP, and skin treatments.">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- ✨ تحسين شكل الرسالة -->
    <style>
      .chat-hint {
        position: fixed;
        bottom: 95px;
        right: 20px;
        background: #ffffff;
        color: #222;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        animation: fadeSlide 0.6s ease forwards, float 3s ease-in-out infinite;
        z-index: 9999;
        opacity: 0;
        max-width: 220px;
      }

      .chat-hint span {
        color: #ff6600;
        font-weight: 600;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
      }

      /* ✨ تأثير pulse احترافي */
      .chat-pulse {
        position: fixed;
        bottom: 22px;
        right: 22px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 102, 0, 0.25);
        animation: pulse 2s infinite;
        z-index: 9998;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.6;
        }
        70% {
          transform: scale(1.6);
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }

      /* 📱 موبايل */
      @media (max-width: 600px) {
        .chat-hint {
          bottom: 80px;
          right: 10px;
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- 🔥 Chatbot Widget -->
    <script src="https://smart-clinic-aide.lovable.app/widget.js" async></script>

    <!-- 💬 الرسالة -->
    <div class="chat-hint" id="chatHint">
      👋 محتاج استشارة؟ <br>
      <span>اتكلم معانا دلوقتي</span>
    </div>

    <!-- ✨ Pulse -->
    <div class="chat-pulse"></div>

    <!-- 🧠 التحكم -->
    <script>
      const hint = document.getElementById("chatHint");

      // تظهر بعد 4 ثواني
      setTimeout(() => {
        hint.style.opacity = "1";
      }, 4000);

      // تختفي لما الشات يفتح
      window.addEventListener("message", function(event) {
        if (event.data === "chat_opened") {
          hint.style.display = "none";
        }
      });

      // تختفي لو المستخدم ضغط عليها
      hint.addEventListener("click", () => {
        hint.style.display = "none";
      });
    </script>

  </body>
</html>
